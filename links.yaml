# ──────────────────────────────────────────────────────────────────
# Repow! — links.yaml
#
# This is the single source of truth for all links.
# To contribute: fork the repo, add your link, open a PR.
#
# STRUCTURE:
#   categories:
#     - name: "Category Name"   # shown as a section heading
#       icon: "🛠️"              # emoji next to the heading
#       links:
#         - title: "Tool Name"
#           url: "https://example.com"
#           description: "One-liner about what it does."
#           tags: [tag1, tag2]    # lowercase, searchable, clickable
#           badges: [free, tool]  # see badge options below
#
# BADGE OPTIONS:
#   community   — maintained by the community
#   opensource  — source code is public
#   official    — made by the official org/team
#   free        — free to use
#   paid        — requires payment
#   tool        — it's a tool/app (not just a resource)
# ──────────────────────────────────────────────────────────────────

categories:
