<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repow! — Awesome Links, Supercharged</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="style.css">

<!-- Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Fuse.js/7.0.0/fuse.min.js"></script>
</head>
<body>

<!-- ── TOPBAR ── -->
<nav class="topbar">
  <div class="brand">Re<em>pow!</em></div>
  <div class="divider"></div>
  <div class="search-wrap">
    <span class="si">⌕</span>
    <input type="text" id="search" placeholder="search links, tags, descriptions…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="topbar-right">
    <div class="stat-pill"><strong id="stat-total">…</strong> links</div>
    <div class="stat-pill"><strong id="stat-cats">…</strong> categories</div>
    <button class="btn-add" id="fab-btn">+ Add link</button>
  </div>
</nav>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Filter by tag</div>
      <div id="tag-nav"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Categories</div>
      <div id="cat-nav"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Shortcuts</div>
      <div class="kb-hints">
        <kbd>/</kbd> search<br>
        <kbd>Esc</kbd> clear<br>
        <kbd>+</kbd> add link
      </div>
    </div>
    <div class="footer">
      <a href="#" id="view-yaml-link">view raw yaml</a><br>
      <a href="https://github.com" target="_blank">github ↗</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="results-bar" id="results-bar"></div>
    <div id="content"><div class="loading">Loading links…</div></div>
  </main>

</div>

<!-- ── ADD LINK MODAL ── -->
<div class="overlay" id="add-modal">
  <div class="modal-box">
    <h3>Add a <span>link</span></h3>
    <div class="form-row">
      <label>URL *</label>
      <input type="url" id="f-url" placeholder="https://…" />
    </div>
    <div class="form-row">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="My Awesome Tool" />
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="f-desc" rows="2" placeholder="One-liner — what does it do?"></textarea>
    </div>
    <div class="form-row">
      <label>Category</label>
      <input type="text" id="f-cat" placeholder="Developer Tools / Learning / AI…" />
    </div>
    <div class="form-row">
      <label>Tags <span style="opacity:.4;font-size:10px;text-transform:none;letter-spacing:0">(comma separated)</span></label>
      <input type="text" id="f-tags" placeholder="typescript, cli, productivity" />
    </div>
    <div class="form-row">
      <label>Badges</label>
      <div class="badge-picker" id="badge-picker">
        <button class="bp-btn" data-badge="community">community</button>
        <button class="bp-btn" data-badge="opensource">open-source</button>
        <button class="bp-btn" data-badge="official">official</button>
        <button class="bp-btn" data-badge="free">free</button>
        <button class="bp-btn" data-badge="paid">paid</button>
        <button class="bp-btn" data-badge="tool">tool</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="add-cancel">cancel</button>
      <button class="btn btn-primary" id="add-generate">generate yaml ↓</button>
    </div>
    <pre class="yaml-block" id="yaml-out"></pre>
    <p class="copy-note" id="copy-note">✓ copied — paste into <code>links.yaml</code> and open a PR!</p>
  </div>
</div>

<!-- ── YAML VIEWER MODAL ── -->
<div class="overlay" id="yaml-modal">
  <div class="modal-box yaml-viewer-box">
    <h3>Raw <span>links.yaml</span></h3>
    <pre class="yaml-block show" id="yaml-viewer-content"></pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="yaml-close">close</button>
      <button class="btn btn-primary" id="yaml-copy-all">copy all</button>
    </div>
  </div>
</div>

<!-- App logic (loads links.yaml via fetch) -->
<script src="app.js"></script>

</body>
</html>
